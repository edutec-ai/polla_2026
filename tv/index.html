<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fútbol Libre - Fondo de App con Orientación</title>
    <style>
        /* ============================================================ */
        /* ==================== AJUSTES MANUALES ===================== */
        /* ============================================================ */
        
        /* ============================================================ */
        /* ANCHOS DESKTOP (pantallas grandes > 768px)                   */
        /* ============================================================ */
        :root {
            /* GRUESOS INDEPENDIENTES para DESKTOP */
            --borde-superior-desktop: 140px;    /* Borde ARRIBA */
            --borde-inferior-desktop: 140px;    /* Borde ABAJO */
            --borde-izquierdo-desktop: 220px;   /* Borde IZQUIERDO */
            --borde-derecho-desktop: 210px;     /* Borde DERECHO */
            
            --padding-desktop: 20px;            /* PADDING DEL BODY EN DESKTOP */
            --altura-iframe-desktop: 85vh;      /* ALTURA DEL IFRAME EN DESKTOP */
        }
        
        /* ============================================================ */
        /* ANCHOS TABLET (pantallas entre 481px y 768px)               */
        /* ============================================================ */
        :root {
            /* GRUESOS INDEPENDIENTES para TABLET */
            --borde-superior-tablet: 130px;      /* Borde ARRIBA */
            --borde-inferior-tablet: 250px;      /* Borde ABAJO */
            --borde-izquierdo-tablet: 40px;     /* Borde IZQUIERDO */
            --borde-derecho-tablet: 40px;       /* Borde DERECHO */
            
            --padding-tablet: 15px;             /* PADDING DEL BODY EN TABLET */
            --altura-iframe-tablet: 75vh;       /* ALTURA DEL IFRAME EN TABLET */
        }
        
        /* ============================================================ */
        /* ANCHOS MOVIL (pantallas menores a 480px)                    */
        /* ============================================================ */
        :root {
            /* GRUESOS INDEPENDIENTES para MÓVIL */
            --borde-superior-movil: 0px;       /* Borde ARRIBA */
            --borde-inferior-movil: 0px;       /* Borde ABAJO */
            --borde-izquierdo-movil: 0px;      /* Borde IZQUIERDO */
            --borde-derecho-movil: 0px;        /* Borde DERECHO */
            
            --padding-movil: 10px;              /* PADDING DEL BODY EN MÓVIL */
            --altura-iframe-movil: 65vh;        /* ALTURA DEL IFRAME EN MÓVIL */
        }
        
        /* ============================================================ */
        /* AJUSTES GLOBALES                                            */
        /* ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ============================================================ */
        /* FONDO DE LA APP - con imagen según orientación              */
        /* ============================================================ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--padding-desktop);
            
            /* FONDO DE LA APP - imagen horizontal por defecto */
            background-image: url('fondoHorizontal.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        /* Cuando el dispositivo está en orientación VERTICAL */
        @media (orientation: portrait) {
            body {
                background-image: url('fondoVertical.jpg');
            }
        }
        
        /* Cuando el dispositivo está en orientación HORIZONTAL */
        @media (orientation: landscape) {
            body {
                background-image: url('fondoHorizontal.jpg');
            }
        }
        
        .contenedor {
            width: 100%;
            max-width: 1300px;
            background: transparent;  /* Fondo transparente para ver la imagen de fondo */
            border-radius: 24px;
            overflow: hidden;
        }
        
        .header {
            background: rgba(47, 87, 137, 0);  /* Semitransparente para ver el fondo */
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            color: #f9f3c1;
            text-align: center;
            border-bottom: 2px solid #f5b042;
        }
        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 6px;
        }
        
        /* ============================================================ */
        /* WRAPPER DEL IFRAME                                           */
        /* ============================================================ */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: var(--altura-iframe-desktop);
            background: transparent;  /* Fondo transparente para ver la imagen */
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #0b0533;  /* El video tiene fondo negro */
        }
        
        /* ============================================================ */
        /* MARCO FLOTANTE - BORDES INDEPENDIENTES                       */
        /* ============================================================ */
        .marco-flotante {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            /* CADA BORDE CON SU PROPIO GROSOR */
            border-top: var(--borde-superior-desktop) solid #0b0533;
            border-bottom: var(--borde-inferior-desktop) solid #0b0533;
            border-left: var(--borde-izquierdo-desktop) solid #0b0533;
            border-right: var(--borde-derecho-desktop) solid #0b0533;
            background: transparent;
            z-index: 100;
            pointer-events: none;
            box-sizing: border-box;
            border-radius: 0px;
        }
        
        /* ============================================================ */
        /* MEDIA QUERIES                                               */
        /* ============================================================ */
        
        /* TABLET */
        @media (max-width: 768px) {
            body {
                padding: var(--padding-tablet);
            }
            .iframe-wrapper {
                height: var(--altura-iframe-tablet);
            }
            .marco-flotante {
                border-top: var(--borde-superior-tablet) solid #0b0533;
                border-bottom: var(--borde-inferior-tablet) solid #0b0533;
                border-left: var(--borde-izquierdo-tablet) solid #0b0533;
                border-right: var(--borde-derecho-tablet) solid #0b0533;
            }
            .header h1 {
                font-size: 1.5rem;
            }
        }
        
        /* MÓVIL */
        @media (max-width: 480px) {
            body {
                padding: var(--padding-movil);
            }
            .iframe-wrapper {
                height: var(--altura-iframe-movil);
            }
            .marco-flotante {
                border-top: var(--borde-superior-movil) solid #0b0533;
                border-bottom: var(--borde-inferior-movil) solid #0b0533;
                border-left: var(--borde-izquierdo-movil) solid #0b0533;
                border-right: var(--borde-derecho-movil) solid #0b0533;
            }
            .header h1 {
                font-size: 1.2rem;
            }
            .header p {
                font-size: 0.7rem;
            }
        }
        
        /* Rango intermedio */
        @media (min-width: 481px) and (max-width: 700px) {
            .iframe-wrapper {
                height: var(--altura-iframe-tablet);
            }
        }
        
        .aviso {
            background: rgba(44, 30, 15, 0.9);
            backdrop-filter: blur(10px);
            color: #ffdd99;
            padding: 12px;
            text-align: center;
            font-size: 0.8rem;
            border-top: 1px solid #c97e2a;
        }
        .aviso a {
            color: #ffb347;
            text-decoration: none;
            margin: 0 5px;
        }
        .aviso a:hover {
            text-decoration: underline;
        }
        
        /* Indicador de orientación */
        .orientacion-badge {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="contenedor">
    <div class="header">
        <h1>⚽ TRANSMISIÓN EN VIVO</h1>
        <p>DirecTV [DSports]</p>
    </div>
    <div class="iframe-wrapper">
        
        <!-- MARCO FLOTANTE CON BORDES INDEPENDIENTES -->
        <div class="marco-flotante"></div>
        
        <iframe 
            src="https://futbol-libres.su/eventos.html?r=aHR0cHM6Ly9sYXRhbXZpZHpzLm9yZy9jYW5hbC5waHA/c3RyZWFtPWRzcG9ydHM="
            title="Fútbol Libre Eventos"
            allow="autoplay; fullscreen; encrypted-media"
            referrerpolicy="strict-origin-when-cross-origin"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals">
        </iframe>
    </div>

</div>

<script>
    const iframe = document.querySelector('iframe');
    const orientacionBadge = document.getElementById('orientacionBadge');
    
    // Función para recargar el iframe
    function recargarIframe() {
        if (iframe) {
            iframe.src = iframe.src;
        }
    }
    
    // Función para recargar toda la página (actualiza fondo si cambió orientación)
    function recargarPagina() {
        window.location.reload();
    }
    
    // Función para actualizar el badge de orientación
    function actualizarBadge() {
        const esPortrait = window.matchMedia("(orientation: portrait)").matches;
        if (esPortrait) {
            orientacionBadge.textContent = '📱 Fondo VERTICAL';
            orientacionBadge.style.background = '#2e7d5e';
            console.log('📱 Orientación VERTICAL - usando fondoVertical.jpg');
        } else {
            orientacionBadge.textContent = '💻 Fondo HORIZONTAL';
            orientacionBadge.style.background = '#f5b042';
            console.log('💻 Orientación HORIZONTAL - usando fondoHorizontal.jpg');
        }
    }
    
    // Detectar cambios de orientación
    window.addEventListener('resize', function() {
        actualizarBadge();
        // Opcional: recargar fondo sin recargar página
        const esPortrait = window.matchMedia("(orientation: portrait)").matches;
        if (esPortrait) {
            document.body.style.backgroundImage = "url('fondoVertical.jpg')";
        } else {
            document.body.style.backgroundImage = "url('fondoHorizontal.jpg')";
        }
    });
    
    // Al cargar la página
    window.addEventListener('load', function() {
        actualizarBadge();
        
        // Verificar si las imágenes existen
        const imgHorizontal = new Image();
        imgHorizontal.onload = function() {
            console.log('✅ fondoHorizontal.jpg encontrada');
        };
        imgHorizontal.onerror = function() {
            console.log('⚠️ fondoHorizontal.jpg NO encontrada - verifica la ruta');
        };
        imgHorizontal.src = 'fondoHorizontal.jpg';
        
        const imgVertical = new Image();
        imgVertical.onload = function() {
            console.log('✅ fondoVertical.jpg encontrada');
        };
        imgVertical.onerror = function() {
            console.log('⚠️ fondoVertical.jpg NO encontrada - verifica la ruta');
        };
        imgVertical.src = 'fondoVertical.jpg';
    });
</script>
</body>
</html>
